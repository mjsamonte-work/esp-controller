<ion-header [translucent]="true">
  <ion-toolbar>
    <div class="toolbar-shell">
      <div class="toolbar-spacer" aria-hidden="true"></div>
      <ion-title>
        EAS<span class="brand-y">Y</span> PH
      </ion-title>
      <div class="logo-slot" aria-label="Easy PH logo">
        <img src="assets/logo.png" alt="Easy PH logo" class="header-logo" />
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="home-shell">
    <div class="tagline-band">
      <p>Easy life with EASY PH</p>
    </div>

    <div class="hero-stage">
      <ion-card class="welcome-card">
        <ion-card-content>
          <p>Hello! Thank you for choosing <strong>EASY PH.</strong></p>
          <p>We are glad to serve you. Enjoy your easier life with EASY PH.</p>
        </ion-card-content>
      </ion-card>

      <ion-button class="remote-button" expand="block" routerLink="/easy-remote">
        EASY REMOTE
      </ion-button>
    </div>

    <section class="contact-section">
      <h2>CONTACT US</h2>

      <ion-list class="contact-list" lines="none">
        <ion-item class="contact-card" detail="false" href="mailto:easyuansph@gmail.com">
          <div class="contact-content">
            <ion-icon class="contact-icon" name="mail-outline"></ion-icon>
            <ion-label>easyuansph@gmail.com</ion-label>
          </div>
        </ion-item>

        <ion-item class="contact-card" detail="false" href="tel:09063071291">
          <div class="contact-content">
            <ion-icon class="contact-icon" name="call-outline"></ion-icon>
            <ion-label>09063071291</ion-label>
          </div>
        </ion-item>
      </ion-list>
    </section>
  </div>
</ion-content>
