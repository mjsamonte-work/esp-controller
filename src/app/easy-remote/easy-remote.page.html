<ion-header [translucent]="true">
  <ion-toolbar>
    <div class="toolbar-shell">
      <a class="back-button" routerLink="/devices" aria-label="Back to devices">
        <ion-icon name="chevron-back-outline" aria-hidden="true"></ion-icon>
      </a>
      <ion-title>
        EAS<span class="brand-y">Y</span> PH
      </ion-title>
      <div class="logo-slot" aria-label="Easy PH logo">
        <img src="assets/logo.png" alt="Easy PH logo" class="header-logo" />
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="remote-shell">
    <div class="remote-stage">
      <section class="status-card">
        <div>
          <p class="section-label">Active Device</p>
          <h2>{{ deviceCode }}</h2>
          <p class="device-location">{{ deviceLocation }}</p>
        </div>

        <div>
          <p class="section-label">Connection</p>
          <h2>Connection Status:</h2>
        </div>

        <div
          class="status-pill"
          [ngClass]="(connectionState$ | async) === 'subscribed' ? 'status-connected' : 'status-disconnected'"
        >
          {{ (connectionState$ | async) === 'subscribed' ? 'Connected' : 'Disconnected' }}
        </div>
      </section>

      <section class="remote-actions">
        <ion-button
          class="action-button on-button"
          expand="block"
          [disabled]="isSubmitting"
          (click)="requestStateChange('ON')"
        >
          <ng-container *ngIf="submittingState === 'ON'; else onLabel">
            <ion-spinner name="crescent"></ion-spinner>
            <span>LOADING...</span>
          </ng-container>
          <ng-template #onLabel>TURN ON</ng-template>
        </ion-button>
        <ion-button
          class="action-button off-button"
          expand="block"
          [disabled]="isSubmitting"
          (click)="requestStateChange('OFF')"
        >
          <ng-container *ngIf="submittingState === 'OFF'; else offLabel">
            <ion-spinner name="crescent"></ion-spinner>
            <span>LOADING...</span>
          </ng-container>
          <ng-template #offLabel>TURN OFF</ng-template>
        </ion-button>
      </section>
    </div>

    <app-contact-us></app-contact-us>
  </div>

  <ion-toast
    [isOpen]="toastOpen"
    [message]="toastMessage"
    [color]="toastColor"
    duration="1800"
    position="top"
    (didDismiss)="closeToast()"
  ></ion-toast>

  <ion-alert
    [isOpen]="confirmAlertOpen"
    [header]="confirmHeader"
    [message]="confirmMessage"
    [buttons]="confirmButtons"
    (didDismiss)="cancelStateChange()"
  ></ion-alert>
</ion-content>
